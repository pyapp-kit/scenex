[project]
site_name = "scenex"
site_url = "https://pyapp-kit.github.io/scenex/"
site_description = "Declarative scene graph model and backend abstraction."
repo_name = "pyapp-kit/scenex"
repo_url = "https://github.com/pyapp-kit/scenex"
nav = [
  "index.md",
  "install.md",
  "theory.md",
  # NOTE that this section will be autogenerated with gen_examples.py
  {Examples = ["examples/index.md"]},
  {References = [
    "references/index.md",
    "references/model.md",
    "references/app.md",
    "references/adaptors.md",
    "references/imgui.md",
    {"scenex.utils" = ["references/utils/index.md", "references/utils/projections.md"]}]},
  "contributing.md",
]
extra_css = ["css/extra.css", "css/install-table.css"]
extra_javascript=["js/install-table.js"]

[project.theme]
custom_dir = "docs/_overrides"
features = [
  "search.highlight",
  "search.suggest",
  "content.code.copy",
  "content.code.annotate",
  "navigation.indexes",
  "navigation.footer",
  "toc.follow",
]

[project.theme.icon]
logo = "material/graph"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle = {icon = "material/brightness-auto", name = "Switch to light mode"}

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "black"
toggle = {icon = "material/brightness-7", name = "Switch to dark mode"}

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
toggle = {icon = "material/brightness-4", name = "Switch to system preference"}

# -- Markdown extensions ------------------------------------------------------

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = "#"

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.highlight]
pygments_lang_class = true
line_spans = "__span"

[project.markdown_extensions.pymdownx.snippets]
check_paths = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

# -- Plugins ------------------------------------------------------------------

[project.plugins.autorefs]
resolve_closest = true

[project.plugins.search]

[project.plugins.spellcheck]
backends = [{codespell = {dictionaries = ["clear"]}}]

[project.plugins.mkdocstrings.handlers.python]
inventories = [
  "https://docs.python.org/3/objects.inv",
  "https://numpy.org/doc/stable/objects.inv",
  "https://docs.pydantic.dev/latest/objects.inv",
  "https://cmap-docs.readthedocs.io/objects.inv",
  "https://psygnal.readthedocs.io/en/latest/objects.inv",
]
paths=["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_section_style = "list"
docstring_style = "numpy"
filters = ["!^_"]
heading_level = 1
inherited_members = true
merge_init_into_class = true
parameter_headings = true
preload_modules = ["scenex"]
relative_crossrefs = true
scoped_crossrefs = true
separate_signature = true
show_inheritance_diagram = true
show_root_heading = true
show_signature_annotations = true
show_symbol_type_heading = true
show_symbol_type_toc = true
signature_crossrefs = true
summary = true
unwrap_annotated = true

# -- Extra --------------------------------------------------------------------

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/pyapp-kit/scenex"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/scenex/"

[project.extra.version]
provider = "mike"
